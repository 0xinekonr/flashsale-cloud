global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:18081'  # user-service
          - 'host.docker.internal:18082'  # gateway
          - 'host.docker.internal:18083'  # inventory-service
          - 'host.docker.internal:18084'  # order-service
          - 'host.docker.internal:18085'  # payment-service
          - 'host.docker.internal:18086'  # seckill-service
          - 'host.docker.internal:18087'  # product-service
          - 'host.docker.internal:19000'  # auth-service